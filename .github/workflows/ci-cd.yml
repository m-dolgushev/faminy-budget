name: CI/CD

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  supabase-migrations:
    name: Supabase DB Push
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - id: precheck
        name: Check Supabase secrets
        shell: bash
        run: |
          if [[ -z "${SUPABASE_ACCESS_TOKEN}" || -z "${SUPABASE_PROJECT_REF}" || -z "${SUPABASE_DB_PASSWORD}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Supabase secrets are missing. Skipping DB push."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: supabase/setup-cli@v1
        if: steps.precheck.outputs.ready == 'true'
        with:
          version: latest
      - name: Link project
        if: steps.precheck.outputs.ready == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
      - name: Push migrations
        if: steps.precheck.outputs.ready == 'true'
        run: supabase db push --linked

  docker-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [supabase-migrations]
    if: ${{ always() && needs.supabase-migrations.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
